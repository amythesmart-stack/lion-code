<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1a1a2e"/>

  <!-- Mane — solid bold circle -->
  <circle cx="64" cy="52" r="52" fill="white"/>

  <!-- Ears — triangular, pointy, above the mane -->
  <polygon points="30,18 14,0 44,14" fill="white"/>
  <polygon points="32,20 18,4 44,16" fill="#ccc"/>
  <polygon points="98,18 114,0 84,14" fill="white"/>
  <polygon points="96,20 110,4 84,16" fill="#ccc"/>

  <!-- Face — off-white oval, slightly lighter feel -->
  <ellipse cx="64" cy="54" rx="30" ry="29" fill="#f0f0f0"/>

  <!-- Brows — heavy diagonal, fierce -->
  <path d="M38 38 L55 34" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <path d="M90 38 L73 34" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>

  <!-- Eyes — horizontal almond slits -->
  <ellipse cx="50" cy="44" rx="9" ry="6"   fill="white"/>
  <ellipse cx="78" cy="44" rx="9" ry="6"   fill="white"/>
  <ellipse cx="50" cy="44" rx="6" ry="4.5" fill="#1a1a2e"/>
  <ellipse cx="78" cy="44" rx="6" ry="4.5" fill="#1a1a2e"/>
  <ellipse cx="50" cy="44" rx="2" ry="3.5" fill="#050505"/>
  <ellipse cx="78" cy="44" rx="2" ry="3.5" fill="#050505"/>
  <circle cx="52.5" cy="42" r="1.8" fill="white"/>
  <circle cx="80.5" cy="42" r="1.8" fill="white"/>

  <!-- Nose -->
  <path d="M56 54 Q64 51 72 54 Q64 61 56 54Z" fill="#1a1a2e"/>

  <!-- Muzzle pads -->
  <ellipse cx="49" cy="62" rx="9" ry="6" fill="#e8e8e8"/>
  <ellipse cx="79" cy="62" rx="9" ry="6" fill="#e8e8e8"/>

  <!-- Whisker dots -->
  <circle cx="36" cy="58" r="2.5" fill="#bbb"/>
  <circle cx="36" cy="64" r="2.5" fill="#bbb"/>
  <circle cx="92" cy="58" r="2.5" fill="#bbb"/>
  <circle cx="92" cy="64" r="2.5" fill="#bbb"/>

  <!-- ROARING MOUTH — dominant, lower half of face -->
  <!-- Cavity -->
  <path d="M34 68 Q64 86 94 68 L94 90 Q64 110 34 90Z" fill="#1a1a2e"/>

  <!-- Tongue -->
  <ellipse cx="64" cy="99" rx="16" ry="8" fill="#c03050"/>
  <path d="M64 91 Q64 103 64 107" stroke="#a02040" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Upper jaw -->
  <path d="M32 67 Q64 82 96 67 L96 59 Q64 54 32 59Z" fill="#f0f0f0"/>

  <!-- Upper fangs — 2 large canines + 2 small incisors -->
  <polygon points="40,68 36,83 47,80"   fill="white"/>
  <polygon points="57,71 55,84 63,83"   fill="white"/>
  <polygon points="71,71 65,83 73,84"   fill="white"/>
  <polygon points="88,68 81,80 92,83"   fill="white"/>

  <!-- Lower jaw -->
  <path d="M32 90 Q64 76 96 90 L96 98 Q64 112 32 98Z" fill="#e8e8e8"/>

  <!-- Lower fangs -->
  <polygon points="42,90 38,80 50,84"   fill="white"/>
  <polygon points="64,89 60,78 69,78"   fill="white"/>
  <polygon points="86,90 78,84 90,80"   fill="white"/>
</svg>
